<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Practice Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!--
    SNAKE GAME PROJECT

    Learning Objectives:
    - HTML5 Canvas API
    - Game loops (setInterval/requestAnimationFrame)
    - Keyboard event handling
    - Collision detection
    - Array manipulation (push, unshift, pop)
    - Game state management
    - Drawing shapes on canvas

    This classic snake game teaches fundamental game development concepts
    that apply to any interactive application.
  -->

  <div class="game-container">

    <!-- Game Header -->
    <header>
      <h1>🐍 Snake Game</h1>
      <div class="stats">
        <div class="stat">
          <span class="label">Score:</span>
          <span id="score" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">High Score:</span>
          <span id="highScore" class="value">0</span>
        </div>
      </div>
    </header>

    <!-- Game Canvas -->
    <!--
      Canvas is an HTML element for drawing graphics with JavaScript.
      Width and height define the size in pixels (not CSS pixels).
    -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- Game Controls -->
    <div class="controls">
      <button id="startBtn" class="btn btn-primary">Start Game</button>
      <button id="pauseBtn" class="btn btn-secondary" disabled>Pause</button>
      <button id="resetBtn" class="btn btn-secondary">Reset</button>
    </div>

    <!-- Instructions -->
    <div class="instructions">
      <h3>How to Play</h3>
      <ul>
        <li>Use <strong>Arrow Keys</strong> to control the snake</li>
        <li>Eat the red food to grow and earn points</li>
        <li>Don't hit the walls or yourself!</li>
        <li>Press <strong>Space</strong> to pause/resume</li>
      </ul>

      <h3>Controls</h3>
      <div class="keyboard-controls">
        <div class="key">↑</div>
        <div class="key-row">
          <div class="key">←</div>
          <div class="key">↓</div>
          <div class="key">→</div>
        </div>
      </div>
    </div>

    <!-- Game Over Screen (Hidden by default) -->
    <div id="gameOver" class="game-over hidden">
      <h2>Game Over!</h2>
      <p>Your Score: <span id="finalScore"></span></p>
      <button id="restartBtn" class="btn btn-primary">Play Again</button>
    </div>

    <footer>
      <a href="../../index.html">← Back to Course Home</a>
    </footer>

  </div>

  <!-- Load JavaScript -->
  <script src="script.js"></script>
</body>
</html>
